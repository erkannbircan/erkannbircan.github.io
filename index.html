<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GridPilot — Window manager for macOS</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.25rem;
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1d1d1f; background: radial-gradient(120% 100% at 50% 0%, #eef2ff 0%, #fff 55%);
    -webkit-font-smoothing: antialiased; text-align: center;
  }
  main { max-width: 560px; }
  .dot { width: 76px; height: 76px; border-radius: 20px; margin: 0 auto 1.5rem;
    background: linear-gradient(135deg,#3b6ef5,#8b5cf6);
    box-shadow: 0 12px 40px rgba(59,110,245,.35); }
  h1 { font-size: 2.6rem; letter-spacing: -.03em; margin: 0 0 .5rem; }
  p.tag { font-size: 1.2rem; color: #444; margin: 0 0 2.2rem; }
  .links { display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
  .links a { text-decoration: none; font-weight: 600; padding: .7rem 1.4rem; border-radius: 11px;
    border: 1px solid rgba(0,0,0,.12); color: #1d1d1f; transition: transform .12s ease; }
  .links a.primary { background: #3b6ef5; color: #fff; border-color: transparent; }
  .links a:hover { transform: translateY(-1px); }
  footer { margin-top: 2.5rem; color: #86868b; font-size: .85rem; }
  @media (prefers-color-scheme: dark) {
    body { color: #f5f5f7; background: radial-gradient(120% 100% at 50% 0%, #0f1735 0%, #000 55%); }
    p.tag { color: #c7c7cc; }
    h1 { color: #f5f5f7; }
    .links a { border-color: rgba(255,255,255,.2); color: #f5f5f7; }
    .links a.primary { background: #3b6ef5; color: #fff; }
  }
</style>
</head>
<body>
<main>
  <div class="dot"></div>
  <h1>GridPilot</h1>
  <p class="tag">Snap, arrange, and restore every window on your Mac — from the menu bar.</p>
  <div class="links">
    <a class="primary" href="/support">Support</a>
    <a href="/privacy">Privacy Policy</a>
  </div>
  <footer>© 2026 GridPilot</footer>
</main>
</body>
</html>
